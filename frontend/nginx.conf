server {
    listen 80;
    client_max_body_size 500M;
    
    # 强制使用 UTF-8，解决中文文件名下载问题
    charset utf-8;

    # 1. 静态文件预览：不强制下载，仅供 PDF / Markdown 在线查看
    location = /preview {
        return 404;
    }

    location /preview/ {
        alias /usr/share/nginx/html/files/;
        types {
            application/pdf pdf;
            text/markdown md markdown;
        }
        default_type application/octet-stream;
        add_header X-Content-Type-Options "nosniff";
        autoindex off;
    }

    # 2. 静态文件下载 (关键修复：去掉 ^~ 和 alias，改用 root)
    # 当访问 /files/abc.img 时，Nginx 会寻找 root + uri
    # 即 /usr/share/nginx/html + /files/abc.img
    location /files {
        root /usr/share/nginx/html;
        
        # 强制下载，不预览
        add_header Content-Disposition "attachment";
        add_header Content-Type "application/octet-stream";
        
        # 关键：直接尝试文件，找不到就报404，绝不转发给 index.html
        try_files $uri =404;
        
        autoindex off;
    }

    # 3. API 接口
    location /api {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /token {
        proxy_pass http://backend:8000;
    }

    # 4. 管理后台
    location /admin {
        alias /usr/share/nginx/html/admin;
        index index.html;
        try_files $uri $uri/ /admin/index.html;
    }

    # 5. 公共端 (单页应用路由兜底)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
