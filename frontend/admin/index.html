<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件后端管理</title>
    <link rel="icon" href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.svg" type="image/svg+xml">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:wght@300;400;500;600;700;800&display=swap');

        :root {
            --bg: #edf6f9;
            --ink: #14222b;
            --muted: #526875;
            --glass: rgba(255, 255, 255, .56);
            --glass-strong: rgba(255, 255, 255, .75);
            --glass-soft: rgba(255, 255, 255, .34);
            --line: rgba(88, 118, 132, .20);
            --line-strong: rgba(88, 118, 132, .34);
            --cyan: #1e9ec4;
            --mint: #16b79c;
            --coral: #f06f61;
            --amber: #e39b3b;
            --danger: #e05252;
            --focus: 0 0 0 3px rgba(30, 158, 196, .22);
        }

        .dark {
            --bg: #081216;
            --ink: #edf8fb;
            --muted: #9fb3bc;
            --glass: rgba(14, 28, 35, .58);
            --glass-strong: rgba(16, 33, 41, .78);
            --glass-soft: rgba(255, 255, 255, .07);
            --line: rgba(196, 229, 237, .16);
            --line-strong: rgba(196, 229, 237, .28);
            --cyan: #5bd8ff;
            --mint: #5ce3c8;
            --coral: #ff9a8d;
            --amber: #ffc46f;
            --danger: #ff8f8f;
            --focus: 0 0 0 3px rgba(91, 216, 255, .25);
        }

        body {
            min-height: 100vh;
            overflow-x: hidden;
            font-family: "Fira Sans", "PingFang SC", "Microsoft YaHei", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 8% -6%, rgba(82, 186, 214, .32), transparent 30rem),
                radial-gradient(circle at 92% 0%, rgba(240, 111, 97, .20), transparent 28rem),
                radial-gradient(circle at 82% 78%, rgba(72, 214, 178, .20), transparent 30rem),
                linear-gradient(135deg, #f7fbfc 0%, var(--bg) 52%, #f2f4ff 100%);
        }

        .dark body {
            background:
                radial-gradient(circle at 8% -6%, rgba(30, 158, 196, .28), transparent 30rem),
                radial-gradient(circle at 92% 0%, rgba(141, 140, 245, .17), transparent 28rem),
                radial-gradient(circle at 82% 78%, rgba(22, 183, 156, .17), transparent 30rem),
                linear-gradient(135deg, #061014 0%, #081216 52%, #0d111d 100%);
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: .16;
            background-image:
                linear-gradient(rgba(255,255,255,.36) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,.26) 1px, transparent 1px);
            background-size: 44px 44px;
            mask-image: linear-gradient(to bottom, rgba(0,0,0,.88), transparent 86%);
        }

        .font-mono {
            font-family: "Fira Code", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        }

        .glass-shell,
        .glass-panel,
        .glass-popover {
            border: 1px solid var(--line);
            background: var(--glass);
            -webkit-backdrop-filter: blur(22px) saturate(145%);
            backdrop-filter: blur(22px) saturate(145%);
            box-shadow: 0 24px 80px rgba(39, 72, 84, .15);
        }

        .dark .glass-shell,
        .dark .glass-panel,
        .dark .glass-popover {
            box-shadow: 0 24px 90px rgba(0, 0, 0, .42);
        }

        .glass-panel {
            border-radius: .5rem;
            overflow: hidden;
        }

        .glass-shell {
            border-radius: 0;
        }

        .glass-nav {
            display: inline-flex;
            align-items: center;
            justify-content: flex-start;
            gap: .6rem;
            border-radius: .5rem;
            border: 1px solid transparent;
            font-weight: 800;
            cursor: pointer;
            transition: background-color .2s ease, border-color .2s ease, color .2s ease, box-shadow .2s ease;
        }

        .glass-btn,
        .ghost-btn,
        .icon-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: .45rem;
            border-radius: .5rem;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, .52);
            color: var(--ink);
            font-weight: 800;
            cursor: pointer;
            transition: background-color .2s ease, border-color .2s ease, color .2s ease, box-shadow .2s ease;
        }

        .dark .glass-btn,
        .dark .ghost-btn,
        .dark .icon-btn {
            background: rgba(255, 255, 255, .07);
        }

        .glass-btn:hover,
        .ghost-btn:hover,
        .icon-btn:hover,
        .glass-nav:hover {
            border-color: var(--line-strong);
            background: rgba(255, 255, 255, .74);
        }

        .dark .glass-btn:hover,
        .dark .ghost-btn:hover,
        .dark .icon-btn:hover,
        .dark .glass-nav:hover {
            background: rgba(255, 255, 255, .12);
        }

        .primary-btn {
            border-color: rgba(30, 158, 196, .34);
            background: linear-gradient(135deg, rgba(30,158,196,.92), rgba(22,183,156,.92));
            color: white;
            box-shadow: 0 14px 36px rgba(30, 158, 196, .24);
        }

        .primary-btn:hover {
            background: linear-gradient(135deg, rgba(21,141,179,.96), rgba(16,164,139,.96));
            color: white;
        }

        .danger-btn {
            border-color: rgba(224, 82, 82, .22);
            background: rgba(224, 82, 82, .09);
            color: var(--danger);
        }

        .field {
            width: 100%;
            border-radius: .5rem;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, .52);
            padding: .82rem .95rem;
            color: var(--ink);
            font-weight: 700;
            outline: none;
            transition: border-color .2s ease, box-shadow .2s ease, background-color .2s ease;
        }

        .dark .field {
            background: rgba(255,255,255,.07);
        }

        .field:focus,
        .glass-btn:focus-visible,
        .ghost-btn:focus-visible,
        .icon-btn:focus-visible,
        .glass-nav:focus-visible,
        button:focus-visible,
        a:focus-visible,
        input:focus-visible,
        textarea:focus-visible,
        select:focus-visible {
            outline: none;
            box-shadow: var(--focus);
            border-color: var(--cyan);
        }

        .label {
            display: block;
            margin-bottom: .42rem;
            font-size: .72rem;
            font-weight: 800;
            color: var(--muted);
        }

        .table-wrap {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .admin-table {
            min-width: 940px;
        }

        .soft-row {
            transition: background-color .18s ease, box-shadow .18s ease;
        }

        .soft-row:hover {
            background: rgba(255,255,255,.46);
            box-shadow: inset 3px 0 0 rgba(30, 158, 196, .72);
        }

        .dark .soft-row:hover {
            background: rgba(255,255,255,.07);
        }

        .chip {
            border: 1px solid var(--line);
            background: rgba(255,255,255,.46);
            color: var(--muted);
        }

        .dark .chip {
            background: rgba(255,255,255,.07);
        }

        .modal-backdrop {
            background:
                radial-gradient(circle at 18% 0%, rgba(30,158,196,.16), transparent 28rem),
                rgba(232, 242, 245, .58);
            -webkit-backdrop-filter: blur(10px) saturate(120%);
            backdrop-filter: blur(10px) saturate(120%);
        }

        .dark .modal-backdrop {
            background:
                radial-gradient(circle at 18% 0%, rgba(91,216,255,.18), transparent 28rem),
                rgba(6, 16, 20, .38);
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: .01ms !important;
                animation-iteration-count: 1 !important;
                scroll-behavior: auto !important;
                transition-duration: .01ms !important;
            }
        }
    </style>
</head>
<body class="transition-colors duration-200">
    <div id="app" class="relative min-h-screen">
        <div v-if="!token" class="fixed inset-0 z-50 flex items-center justify-start overflow-x-hidden p-4 sm:justify-center">
            <div class="glass-popover w-full max-w-[22rem] rounded-lg p-7 sm:max-w-sm">
                <div class="mb-7 text-center">
                    <div class="mx-auto mb-4 flex h-14 w-14 items-center justify-center rounded-lg bg-gradient-to-br from-[var(--cyan)] to-[var(--mint)] text-white shadow-lg shadow-cyan-500/20">
                        <i class="ri-shield-keyhole-line text-2xl"></i>
                    </div>
                    <h2 class="text-2xl font-extrabold text-[var(--ink)]">系统登录</h2>
                </div>
                <div class="space-y-4">
                    <div>
                        <label class="label" for="login-user">账号</label>
                        <input id="login-user" v-model="loginForm.username" placeholder="输入账号" class="field">
                    </div>
                    <div>
                        <label class="label" for="login-pass">密码</label>
                        <input id="login-pass" v-model="loginForm.password" type="password" placeholder="输入密码" class="field" @keyup.enter="doLogin">
                    </div>
                    <button @click="doLogin" class="glass-btn primary-btn h-12 w-full">
                        <i class="ri-login-circle-line"></i>
                        立即登录
                    </button>
                </div>
            </div>
        </div>

        <template v-else>
            <div class="flex min-h-screen flex-col lg:flex-row">
                <aside class="glass-shell z-30 flex w-full flex-col border-x-0 border-t-0 lg:sticky lg:top-0 lg:h-screen lg:w-72 lg:border-y-0 lg:border-l-0">
                    <div class="flex items-center gap-3 border-b border-[var(--line)] p-5 lg:p-6">
                        <div class="flex h-12 w-12 shrink-0 items-center justify-center rounded-lg bg-gradient-to-br from-[var(--cyan)] to-[var(--mint)] text-white shadow-lg shadow-cyan-500/20">
                            <i class="ri-cloud-line text-xl"></i>
                        </div>
                        <div>
                            <div class="text-base font-extrabold text-[var(--ink)]">文件后端管理</div>
                        </div>
                    </div>

                    <nav class="flex gap-2 overflow-x-auto p-3 lg:flex-1 lg:flex-col lg:overflow-y-auto lg:p-4" aria-label="后台导航">
                        <button @click="switchTab('files')" :class="tab==='files'?'bg-white/70 text-[var(--ink)] border-[var(--line-strong)] shadow-sm dark:bg-white/12':'text-[var(--muted)] border-transparent'" class="glass-nav h-11 shrink-0 px-4 text-sm lg:w-full"><i class="ri-database-2-line"></i> 资源管理</button>
                        <button @click="openUploadForCurrentFolder" :class="tab==='upload'?'bg-white/70 text-[var(--ink)] border-[var(--line-strong)] shadow-sm dark:bg-white/12':'text-[var(--muted)] border-transparent'" class="glass-nav h-11 shrink-0 px-4 text-sm lg:w-full"><i class="ri-upload-cloud-2-line"></i> 发布固件</button>
                        <button v-if="role==='admin'" @click="switchTab('users')" :class="tab==='users'?'bg-white/70 text-[var(--ink)] border-[var(--line-strong)] shadow-sm dark:bg-white/12':'text-[var(--muted)] border-transparent'" class="glass-nav h-11 shrink-0 px-4 text-sm lg:w-full"><i class="ri-team-line"></i> 成员授权</button>
                        <button v-if="role==='admin'" @click="switchTab('wechat')" :class="tab==='wechat'?'bg-white/70 text-[var(--ink)] border-[var(--line-strong)] shadow-sm dark:bg-white/12':'text-[var(--muted)] border-transparent'" class="glass-nav h-11 shrink-0 px-4 text-sm lg:w-full"><i class="ri-wechat-line"></i> 微信通知</button>
                        <button v-if="role==='admin'" @click="switchTab('cfg')" :class="tab==='cfg'?'bg-white/70 text-[var(--ink)] border-[var(--line-strong)] shadow-sm dark:bg-white/12':'text-[var(--muted)] border-transparent'" class="glass-nav h-11 shrink-0 px-4 text-sm lg:w-full"><i class="ri-window-line"></i> 前端配置</button>
                        <button @click="switchTab('pass')" :class="tab==='pass'?'bg-white/70 text-[var(--ink)] border-[var(--line-strong)] shadow-sm dark:bg-white/12':'text-[var(--muted)] border-transparent'" class="glass-nav h-11 shrink-0 px-4 text-sm lg:w-full"><i class="ri-shield-keyhole-line"></i> 安全中心</button>
                    </nav>

                    <div class="border-t border-[var(--line)] p-4">
                        <button @click="logout" class="glass-btn danger-btn h-11 w-full">
                            <i class="ri-logout-circle-r-line"></i>
                            注销
                        </button>
                    </div>
                </aside>

                <main class="min-w-0 flex-1">
                    <header class="sticky top-0 z-20 border-b border-[var(--line)] bg-white/34 px-4 py-4 backdrop-blur-2xl dark:bg-[#081216]/40 sm:px-6 lg:px-8">
                        <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
                            <div>
                                <h1 class="text-2xl font-extrabold text-[var(--ink)]">{{ tabNames[tab] || '控制台' }}</h1>
                            </div>
                            <div class="flex flex-wrap items-center gap-3">
                                <button @click="toggleDark" aria-label="切换深色模式" class="icon-btn h-11 w-11">
                                    <i :class="isDark?'ri-sun-line text-lg text-[var(--coral)]':'ri-moon-line text-lg text-[var(--cyan)]'"></i>
                                </button>
                                <a href="/" target="_blank" class="glass-btn h-11 px-4 text-sm">
                                    <i class="ri-external-link-line"></i>
                                    预览公共端
                                </a>
                                <div class="glass-btn h-11 px-3 text-sm">
                                    <span class="flex h-7 w-7 items-center justify-center rounded-full bg-cyan-400/15 text-xs font-extrabold text-[var(--cyan)]">{{currentUser ? currentUser[0] : 'U'}}</span>
                                    <span>{{currentUser}}</span>
                                </div>
                            </div>
                        </div>
                    </header>

                    <div class="px-4 py-6 sm:px-6 lg:px-8">
                        <section v-if="tab==='files'" class="space-y-5">
                            <div class="glass-panel p-4 sm:p-5">
                                <div class="flex flex-col gap-4 xl:flex-row xl:items-center xl:justify-between">
                                    <div class="flex items-center gap-2 overflow-x-auto text-sm font-bold text-[var(--muted)]">
                                        <button @click="navTo(0)" class="glass-btn h-10 shrink-0 px-3 text-sm"><i class="ri-home-4-line"></i> 根目录</button>
                                        <template v-for="bc in breadcrumbs"><i class="ri-arrow-right-s-line shrink-0 opacity-55"></i><button @click="navTo(bc.id)" class="glass-btn h-10 shrink-0 px-3 text-sm">{{bc.name}}</button></template>
                                        <button @click="openUploadForCurrentFolder" class="glass-btn primary-btn ml-2 h-10 shrink-0 px-4 text-sm"><i class="ri-upload-cloud-2-line"></i> 发布固件</button>
                                    </div>
                                    <div class="flex flex-col gap-3 sm:flex-row sm:items-center">
                                        <label class="relative sm:w-64">
                                            <i class="ri-search-line absolute left-4 top-1/2 -translate-y-1/2 text-[var(--muted)]"></i>
                                            <input v-model="searchQuery" placeholder="搜索内容..." class="field h-11 pl-11 text-sm">
                                        </label>
                                        <label class="ghost-btn h-11 cursor-pointer px-3 text-sm"><input type="checkbox" v-model="onlyMyFiles" class="h-4 w-4 accent-cyan-500"> 只看我的</label>
                                        <button @click="showFolderModal=true" class="glass-btn h-11 border-cyan-400/25 bg-cyan-400/12 px-4 text-sm text-[var(--cyan)]"><i class="ri-folder-add-line"></i> 新建文件夹</button>
                                    </div>
                                </div>
                            </div>

                            <div class="glass-panel">
                                <div class="table-wrap">
                                    <table class="admin-table w-full text-left">
                                        <thead class="bg-white/30 text-[11px] font-extrabold uppercase text-[var(--muted)] dark:bg-white/5">
                                            <tr><th class="px-6 py-4">资源名称 / 大小</th><th class="px-6 py-4 text-center">版本信息</th><th class="px-6 py-4">记录</th><th class="px-6 py-4 text-right">操作</th></tr>
                                        </thead>
                                        <tbody class="divide-y divide-[var(--line)] bg-white/18 dark:bg-transparent">
                                            <tr v-for="f in displayFolders" @click="navTo(f.id)" class="soft-row group cursor-pointer">
                                                <td colspan="3" class="px-6 py-4">
                                                    <div class="flex items-center gap-3 text-sm font-extrabold text-[var(--ink)]"><i class="ri-folder-3-fill text-xl text-[var(--cyan)]"></i>{{f.name}}</div>
                                                </td>
                                                <td class="px-6 py-4 text-right">
                                                    <div class="flex justify-end gap-2">
                                                        <button @click.stop="openFolderEdit(f)" aria-label="重命名目录" class="icon-btn h-9 w-9 text-[var(--cyan)]"><i class="ri-edit-2-line text-lg"></i></button>
                                                        <button @click.stop="delFolder(f.id)" aria-label="删除文件夹" class="icon-btn h-9 w-9 text-[var(--danger)]"><i class="ri-delete-bin-line text-lg"></i></button>
                                                    </div>
                                                </td>
                                            </tr>
                                            <tr v-for="f in displayFiles" class="soft-row group">
                                                <td class="px-6 py-4">
                                                    <div class="flex items-start gap-3">
                                                        <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-lg border border-cyan-300/35 bg-cyan-200/20 text-[var(--cyan)]"><i :class="getFileIcon(f.name)"></i></div>
                                                        <div class="min-w-0">
                                                            <div class="break-all text-sm font-extrabold text-[var(--ink)]">{{f.name}} <span class="font-mono text-[11px] font-semibold text-[var(--muted)]">({{ formatSize(f.size) }})</span></div>
                                                            <div class="mt-1 text-[11px] font-bold text-[var(--muted)]">{{f.publisher}} @ {{f.date}}</div>
                                                        </div>
                                                    </div>
                                                </td>
                                                <td class="px-6 py-4 text-center"><div class="text-[13px] font-extrabold text-[var(--cyan)]">{{f.version || '-'}}</div><div class="font-mono mt-1 text-[11px] font-semibold text-[var(--muted)]" v-if="f.git_commit">{{f.git_commit}}</div></td>
                                                <td class="max-w-xs truncate px-6 py-4 text-xs font-semibold text-[var(--muted)]">{{f.changelog}}</td>
                                                <td class="px-6 py-4">
                                                    <div class="flex justify-end gap-2">
                                                        <button v-if="f.history && f.history.length > 1" @click.stop="openHistory(f)" aria-label="查看历史版本" class="glass-btn h-9 px-2 text-xs text-[var(--cyan)]"><i class="ri-history-line"></i>{{f.history.length}}</button>
                                                        <button v-if="role==='admin'||f.submitter===currentUser" @click="openEdit(f)" aria-label="编辑资源" class="icon-btn h-9 w-9 text-[var(--cyan)]"><i class="ri-edit-line text-lg"></i></button>
                                                        <button v-if="role==='admin'||f.submitter===currentUser" @click="delF(f.id)" aria-label="删除资源" class="icon-btn h-9 w-9 text-[var(--danger)]"><i class="ri-delete-bin-line text-lg"></i></button>
                                                    </div>
                                                </td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </section>

                        <section v-if="tab==='upload'" class="mx-auto max-w-2xl space-y-5">
                            <div @dragover.prevent="drag=true" @dragleave.prevent="drag=false" @drop.prevent="onDrop" @click="$refs.fIn.click()" :class="drag?'border-cyan-400/60 bg-cyan-400/12':'border-[var(--line)]'" class="glass-panel cursor-pointer border-2 border-dashed p-8 text-center transition-colors sm:p-12">
                                <input type="file" ref="fIn" class="hidden" @change="onFile">
                                <div class="mx-auto mb-4 flex h-16 w-16 items-center justify-center rounded-lg bg-gradient-to-br from-[var(--cyan)] to-[var(--mint)] text-white shadow-lg shadow-cyan-500/20">
                                    <i class="ri-upload-cloud-2-line text-4xl"></i>
                                </div>
                                <div v-if="file" class="mb-2 break-all text-xl font-extrabold text-[var(--ink)]">{{file.name}} <span class="font-mono text-sm text-[var(--muted)]">({{formatSize(file.size)}})</span></div>
                                <p v-else class="text-lg font-extrabold text-[var(--ink)]">点击或拖拽文件到这里</p>
                            </div>
                            <div class="glass-panel p-5 sm:p-6">
                                <div class="space-y-4">
                                    <div>
                                        <label class="label">发布目录</label>
                                        <label class="relative mb-2 block">
                                            <i class="ri-search-line absolute left-4 top-1/2 -translate-y-1/2 text-[var(--muted)]"></i>
                                            <input v-model="folderSearch" @keydown.esc="folderSearch=''" placeholder="搜索目录名称或完整路径..." class="field h-11 pl-11 text-sm">
                                        </label>
                                        <div v-if="folderSearch" class="max-h-48 overflow-y-auto rounded-lg border border-[var(--line)] bg-white/40 p-1 dark:bg-white/5">
                                            <button v-for="option in filteredUploadFolderOptions" @click="selectUploadFolder(option.id)" type="button" class="flex w-full items-center gap-2 rounded-md px-3 py-2 text-left font-mono text-sm font-bold text-[var(--ink)] hover:bg-white/70 dark:hover:bg-white/10">
                                                <i class="ri-folder-line shrink-0 text-[var(--cyan)]"></i>
                                                <span class="min-w-0 break-all">{{option.label}}</span>
                                            </button>
                                            <div v-if="filteredUploadFolderOptions.length===0" class="px-3 py-4 text-center text-sm font-bold text-[var(--muted)]">未找到匹配目录</div>
                                        </div>
                                        <select v-else v-model.number="form.folder_id" class="field font-mono text-sm">
                                            <option v-for="option in uploadFolderOptions" :value="option.id">{{option.label}}</option>
                                        </select>
                                    </div>
                                    <div class="grid grid-cols-1 gap-4 sm:grid-cols-2"><div><label class="label">版本号</label><input v-model="form.v" placeholder="例如 v1.2.0" class="field"></div><div><label class="label">Git ID</label><input v-model="form.git" placeholder="提交哈希" class="field font-mono text-sm"></div></div>
                                    <div><label class="label">变更记录</label><textarea v-model="form.c" placeholder="填写本次发布的变更记录..." class="field h-32 resize-none"></textarea></div>

                        <section v-if="tab==='cfg' && role==='admin'" class="glass-panel mx-auto max-w-3xl p-5 sm:p-6">
                            <div class="mb-6 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between"><h2 class="text-xl font-extrabold text-[var(--ink)]">前端显示配置</h2><button @click="saveCfg" class="glass-btn primary-btn h-10 px-4 text-sm"><i class="ri-save-3-line"></i> 保存全局配置</button></div>
                            <div class="grid grid-cols-1 gap-6 md:grid-cols-2">

                                <div class="space-y-2"><label v-for="(v,k) in {'show_md5':'MD5码','show_version':'版本号','show_date':'发布日期','show_changelog':'变更记录','show_submitter':'发布人','show_git_commit':'Git版本'}" class="flex cursor-pointer items-center justify-between rounded-lg border border-[var(--line)] bg-white/28 p-3 dark:bg-white/5"><span class="font-bold text-[var(--muted)]">{{v}}</span><input type="checkbox" v-model="config[k]" class="h-5 w-5 accent-cyan-500"></label></div>

                        <section v-if="tab==='pass'" class="glass-panel mx-auto max-w-md p-7 text-center">
                            <div class="mx-auto mb-4 flex h-14 w-14 items-center justify-center rounded-lg bg-gradient-to-br from-[var(--cyan)] to-[var(--mint)] text-white shadow-lg shadow-cyan-500/20"><i class="ri-shield-keyhole-line text-2xl"></i></div>

                        <div v-if="showUserEditModal" class="modal-backdrop fixed inset-0 z-50 flex items-center justify-center p-4">
                            <div class="glass-popover w-full max-w-md rounded-lg p-6">
                                <h3 class="mb-5 text-xl font-extrabold text-[var(--ink)]">账号修改</h3>
                                <div class="space-y-4"><div><label class="label">账号 ID</label><input v-model="userEditForm.username" class="field"></div><div><label class="label">姓名</label><input v-model="userEditForm.full_name" class="field"></div><div><label class="label">新密码，留空则不改</label><input v-model="userEditForm.password" type="password" class="field"></div></div>
                                <div class="mt-6 flex gap-3"><button @click="showUserEditModal=false" class="ghost-btn h-10 flex-1">取消</button><button @click="confirmUserEdit" class="glass-btn primary-btn h-10 flex-1">保存修改</button></div>
                            </div>
                        </div>

                        <div v-if="showFolderModal" class="modal-backdrop fixed inset-0 z-50 flex items-center justify-center p-4">
                            <div class="glass-popover w-full max-w-md rounded-lg p-6">
                                <h3 class="mb-5 text-xl font-extrabold text-[var(--ink)]">新建文件夹</h3>
                                <label class="label">目录名称</label>
                                <input v-model="newFolderName" placeholder="输入名称..." class="field" @keyup.enter="confirmCreateFolder">
                                <div class="mt-6 flex gap-3"><button @click="showFolderModal=false" class="ghost-btn h-10 flex-1">取消</button><button @click="confirmCreateFolder" class="glass-btn primary-btn h-10 flex-1">立即创建</button></div>
                            </div>
                        </div>

                        <div v-if="folderEditModal.show" class="modal-backdrop fixed inset-0 z-50 flex items-center justify-center p-4">
                            <div class="glass-popover w-full max-w-md rounded-lg p-6">
                                <h3 class="mb-5 text-xl font-extrabold text-[var(--ink)]">重命名目录</h3>
                                <label class="label">目录名称</label>
                                <input v-model="folderEditModal.name" placeholder="输入名称..." class="field" @keyup.enter="saveFolderEdit">
                                <div class="mt-6 flex gap-3"><button @click="folderEditModal.show=false" class="ghost-btn h-10 flex-1">取消</button><button @click="saveFolderEdit" class="glass-btn primary-btn h-10 flex-1">保存名称</button></div>
                            </div>
                        </div>

                        <div v-if="editModal.show" class="modal-backdrop fixed inset-0 z-[60] flex items-center justify-center p-4">
                            <div class="glass-popover w-full max-w-xl rounded-lg p-6">
                                <h3 class="mb-5 text-xl font-extrabold text-[var(--ink)]">编辑资源</h3>
                                <div class="space-y-4">
                                    <div><label class="label">文件名</label><input v-model="editModal.form.filename" class="field font-mono text-sm"></div>
                                    <div><label class="label">所在目录</label><select v-model.number="editModal.form.folder_id" class="field"><option :value="0">/ 根目录</option><option v-for="folder in folderOptions" :value="folder.id">{{folder.label}}</option></select></div>
                                    <div class="grid grid-cols-1 gap-4 sm:grid-cols-2"><div><label class="label">版本</label><input v-model="editModal.form.version" class="field"></div><div><label class="label">Git ID</label><input v-model="editModal.form.git_commit" class="field font-mono text-sm"></div></div>

                                </div>
                                <div class="mt-6 flex gap-3"><button @click="editModal.show=false" class="ghost-btn h-10 flex-1">取消</button><button @click="saveEdit" class="glass-btn primary-btn h-10 flex-1">保存修改</button></div>
                            </div>
                        </div>

                        <div v-if="historyModal.show" class="modal-backdrop fixed inset-0 z-50 flex items-center justify-center p-4">
                            <div class="glass-popover flex max-h-[82vh] w-full max-w-2xl flex-col rounded-lg p-6">
                                <div class="mb-5 flex items-start justify-between gap-4"><h3 class="break-all text-xl font-extrabold text-[var(--ink)]">版本追溯：{{historyModal.title}}</h3><button @click="historyModal.show=false" aria-label="关闭历史版本" class="icon-btn h-10 w-10"><i class="ri-close-line text-lg"></i></button></div>
                                <div class="table-wrap min-h-0 flex-1">
                                    <table class="w-full min-w-[620px] text-left">
                                        <thead class="bg-white/30 text-[11px] font-extrabold uppercase text-[var(--muted)] dark:bg-white/5"><tr><th class="p-3">版本 / Git</th><th class="p-3">上传时间</th><th class="p-3">变更记录</th><th class="p-3 text-right">操作</th></tr></thead>
                                        <tbody class="divide-y divide-[var(--line)]">
                                            <tr v-for="h in historyModal.list" class="soft-row">
                                                <td class="p-3"><div class="text-[13px] font-extrabold text-[var(--cyan)]">{{h.version||'v1.0'}}</div><div class="font-mono text-[11px] font-semibold text-[var(--muted)]">{{h.git_commit}}</div></td>
                                                <td class="p-3 text-xs font-bold text-[var(--muted)]">{{h.date}}</td>
                                                <td class="max-w-[190px] truncate p-3 text-xs font-semibold text-[var(--muted)]">{{h.changelog}}</td>
                                                <td class="p-3 text-right">
                                                    <div class="flex justify-end gap-2">
                                                        <button @click="openEdit(h)" class="glass-btn h-8 px-3 text-xs text-[var(--cyan)]">编辑此版</button>
                                                        <button @click="deleteHistoryVersion(h)" class="glass-btn h-8 px-3 text-xs text-[var(--danger)]">删除此版</button>
                                                    </div>
                                                </td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </main>
            </div>
        </template>
    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;
        createApp({
            setup() {
                const isDark = ref(localStorage.getItem('theme') === 'dark');
                const token = ref(localStorage.getItem('token') || '');
                const role = ref(localStorage.getItem('role') || '');
                const currentUser = ref(localStorage.getItem('user') || '');
                const tab = ref('files');
                const allFiles = ref([]); const allFolders = ref([]); const userList = ref([]);
                const config = ref({}); const currentFolderId = ref(0);
                const searchQuery = ref(''); const onlyMyFiles = ref(false);
                const folderSearch = ref('');
                const uploadProgress = ref(0);
                const loginForm = ref({username:'', password:''});
                const form = ref({v:'', c:'', git:'', folder_id: 0});
                const uForm = ref({username:'', full_name: '', password:''});
                const userEditForm = ref({id:0, username:'', full_name:'', password:''});
                const showUserEditModal = ref(false);
                const newP = ref(''); const drag = ref(false); const uping = ref(false); const file = ref(null);
                const editModal = ref({ show: false, data: {}, form: {} });
                const showFolderModal = ref(false); const newFolderName = ref('');
                const folderEditModal = ref({ show: false, id: 0, name: '' });
                const tabNames = { files: '资源管理', upload: '发布固件', users: '成员授权', wechat: '微信通知', cfg: '前端配置', pass: '安全中心' };
                const historyModal = ref({ show: false, list: [], title: '' });
                const versionParts = (version) => {
                    const nums = String(version || '').match(/\d+/g);
                    const parts = nums ? nums.map(n => Number(n)).slice(0, 6) : [-1, -1, -1, -1, -1, -1];
                    while(parts.length < 6) parts.push(0);
                    return parts;
                };
                const compareVersionDesc = (a, b) => {
                    const av = versionParts(a.version), bv = versionParts(b.version);
                    for(let i = 0; i < 6; i++) if(av[i] !== bv[i]) return bv[i] - av[i];
                    return new Date(b.date || 0) - new Date(a.date || 0);
                };
                const sortVersions = (list) => [...list].sort(compareVersionDesc);
                const openHistory = (f) => { historyModal.value.list = sortVersions(f.history || []); historyModal.value.title = f.name; historyModal.value.show = true; };

                const formatSize = (b) => { if(!b) return '0 B'; const k=1024, s=['B','KB','MB','GB','TB'], i=Math.floor(Math.log(b)/Math.log(k)); return parseFloat((b/Math.pow(k,i)).toFixed(1))+' '+s[i]; };
                const api = async (u, o={}) => {
                    let url = u; if(!o.method || o.method.toUpperCase() === 'GET') { const ts = Date.now(); url = u.includes('?') ? `${u}&t=${ts}` : `${u}?t=${ts}`; }
                    const res = await fetch(url, {...o, headers: {...o.headers, 'Authorization': `Bearer ${token.value}`}});
                    if(res.status === 401) { localStorage.clear(); location.reload(); } return res;
                };

                const loadData = async () => {
                    if(!token.value) return;
                    try {
                        const res = await api('/api/public/data').then(r=>r.json());
                        allFiles.value = res.files || []; allFolders.value = res.folders || []; config.value = res.config || {};
                        if(role.value === 'admin') userList.value = await api('/api/admin/users').then(r=>r.json());
                    } catch(e) {}
                };

                const switchTab = (t) => { tab.value = t; loadData(); };
                const selectUploadFolder = (id) => {
                    form.value.folder_id = id;
                    folderSearch.value = '';
                };
                const openUploadForCurrentFolder = () => {
                    form.value.folder_id = currentFolderId.value;
                    folderSearch.value = '';
                    tab.value = 'upload';
                    loadData();
                };
                const navTo = (id) => currentFolderId.value = id;
                const logout = () => { localStorage.clear(); location.reload(); };
                const toggleDark = () => { isDark.value = !isDark.value; document.documentElement.classList.toggle('dark'); localStorage.setItem('theme', isDark.value?'dark':'light'); };

                const openUserEdit = (u) => { userEditForm.value = {id:u.id, username:u.username, full_name:u.full_name, password:''}; showUserEditModal.value = true; };
                const confirmUserEdit = async () => { await api(`/api/admin/users/${userEditForm.value.id}`, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(userEditForm.value)}); alert('账号已更新'); showUserEditModal.value = false; loadData(); };
                const testWechat = async () => { const res = await api('/api/admin/wechat/test', {method:'POST'}).then(r=>r.json()); alert(res.errcode === 0 ? "消息测试成功" : "失败: " + res.errmsg); };
                const addU = async () => { await api('/api/admin/users', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(uForm.value)}); alert('成员已成功授权'); uForm.value={username:'', full_name:'', password:''}; loadData(); };
                const delU = async (id) => { if(confirm("确认永久注销该账号？")) { await api(`/api/admin/users/${id}`, {method:'DELETE'}); loadData(); } };
                const saveCfg = async () => { await api('/api/admin/settings', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(config.value)}); alert('配置已成功保存并应用'); };

                const doUp = async () => {
                    if(!file.value) return;
                    uping.value = true;
                    uploadProgress.value = 0;
                    const fd = new FormData();
                    fd.append('file', file.value);
                    fd.append('version', form.value.v);
                    fd.append('changelog', form.value.c);
                    fd.append('git_commit', form.value.git);
                    fd.append('folder_id', form.value.folder_id);
                    const xhr = new XMLHttpRequest();
                    xhr.open('POST', '/api/upload');
                    xhr.setRequestHeader('Authorization', `Bearer ${token.value}`);
                    xhr.upload.onprogress = (e) => { if(e.lengthComputable) uploadProgress.value = Math.round((e.loaded/e.total)*100); };
                    xhr.onload = () => {
                        if(xhr.status === 200) {
                            alert('发布成功');
                            file.value = null;
                            form.value = {v:'', c:'', git:'', folder_id: currentFolderId.value};
                            uploadProgress.value = 0;
                            uping.value = false;
                            tab.value = 'files';
                            loadData();
                        } else {
                            alert('发布失败');
                            uping.value = false;
                        }
                    };
                    xhr.onerror = () => { alert('发布失败：网络连接异常'); uping.value = false; };
                    xhr.send(fd);
                };
                const confirmCreateFolder = async () => {
                    if(!newFolderName.value.trim()) return;
                    const response = await api('/api/admin/folders', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name:newFolderName.value, parent_id: currentFolderId.value})});
                    if(!response.ok) {
                        let message = '创建文件夹失败';
                        try { const body = await response.json(); if(body.detail) message = body.detail; } catch(e) {}
                        alert(message);
                        return;
                    }
                    newFolderName.value = '';
                    showFolderModal.value = false;
                    loadData();
                };
                const delFolder = async (id) => {
                    if(!confirm('确认删除此目录？仅空目录可以删除。')) return;
                    const response = await api(`/api/admin/folders/${id}`, {method:'DELETE'});
                    if(!response.ok) {
                        let message = '删除目录失败';
                        try { const body = await response.json(); if(body.detail) message = body.detail; } catch(e) {}
                        alert(message);
                        return;
                    }
                    loadData();
                };
                const openFolderEdit = (folder) => { folderEditModal.value = { show: true, id: folder.id, name: folder.name }; };
                const saveFolderEdit = async () => {
                    const name = folderEditModal.value.name.trim();
                    if(!name || !confirm(`确认将目录重命名为“${name}”？`)) return;
                    const response = await api(`/api/admin/folders/${folderEditModal.value.id}`, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name})});
                    if(!response.ok) {
                        let message = '重命名目录失败';
                        try { const body = await response.json(); if(body.detail) message = body.detail; } catch(e) {}
                        alert(message);
                        return;
                    }
                    folderEditModal.value.show = false;
                    loadData();
                };
                const openEdit = (f) => { editModal.value.data = f; editModal.value.form = {filename:f.name, folder_id:f.folder_id || 0, version:f.version, changelog:f.changelog, git_commit: f.git_commit}; editModal.value.show = true; };
                const saveEdit = async () => {
                    const data = editModal.value.data;
                    const formData = editModal.value.form;
                    const groupChanged = formData.filename !== data.name || Number(formData.folder_id || 0) !== Number(data.folder_id || 0);
                    if(groupChanged) {
                        await api(`/api/admin/files/${data.id}/group`, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({filename: formData.filename, folder_id: formData.folder_id})});
                    }
                    await api(`/api/admin/files/${data.id}`, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({version: formData.version, changelog: formData.changelog, git_commit: formData.git_commit})});
                    alert('已更新'); editModal.value.show = false; loadData();
                };
                const delF = async (id) => { if(confirm('确认彻底删除？')) { await api(`/api/admin/files/${id}`, {method:'DELETE'}); loadData(); } };
                const deleteHistoryVersion = async (h) => {
                    const lastOne = historyModal.value.list.length <= 1;
                    if(!confirm(lastOne ? '这是最后一个版本，删除后文件将从目录中消失。确认删除？' : '确认删除此历史版本？')) return;
                    await api(`/api/admin/files/${h.id}`, {method:'DELETE'});
                    historyModal.value.list = historyModal.value.list.filter(item => item.id !== h.id);
                    if(historyModal.value.list.length === 0) historyModal.value.show = false;
                    loadData();
                };
                const setPw = async () => { await api('/api/user/password', {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({new_password:newP.value})}); logout(); };
                const doLogin = async () => { const fd = new FormData(); fd.append('username', loginForm.value.username); fd.append('password', loginForm.value.password); const res = await fetch('/token', {method:'POST', body:fd}); if(res.ok) { const d = await res.json(); token.value = d.access_token; role.value = d.role; currentUser.value = loginForm.value.username; localStorage.setItem('token', d.access_token); localStorage.setItem('role', d.role); localStorage.setItem('user', currentUser.value); location.reload(); } else alert('账号或密码错误'); };
                const onDrop = (e) => { drag.value = false; file.value = e.dataTransfer.files[0]; }; const onFile = (e) => { file.value = e.target.files[0]; };
                const folderPathLabel = (id) => {
                    const path = []; let curr = allFolders.value.find(f => f.id === id);
                    while(curr) { path.unshift(curr.name); curr = allFolders.value.find(f => f.id === curr.parent_id); }
                    return '/' + path.join('/');
                };
                const folderOptions = computed(() => allFolders.value.map(folder => ({id: folder.id, label: folderPathLabel(folder.id)})));
                const uploadFolderOptions = computed(() => [{id: 0, label: '/ 根目录'}, ...folderOptions.value]);
                const filteredUploadFolderOptions = computed(() => {
                    const query = folderSearch.value.trim().toLowerCase();
                    if(!query) return uploadFolderOptions.value;
                    return uploadFolderOptions.value.filter(option => option.label.toLowerCase().includes(query));
                });

                onMounted(() => { if(isDark.value) document.documentElement.classList.add('dark'); loadData(); });

                return { isDark, toggleDark, token, role, currentUser, tab, allFiles, allFolders, userList, config, currentFolderId, loginForm, form, uForm, userEditForm, showUserEditModal, openUserEdit, confirmUserEdit, testWechat, newP, drag, uping, file, editModal, switchTab, selectUploadFolder, openUploadForCurrentFolder, navTo, showFolderModal, newFolderName, folderEditModal, openFolderEdit, saveFolderEdit, confirmCreateFolder, delFolder, doUp, doLogin, onDrop, onFile, delF, openEdit, saveEdit, addU, delU, saveCfg, setPw, logout, tabNames, formatSize, uploadProgress, searchQuery, onlyMyFiles, folderSearch, uploadFolderOptions, filteredUploadFolderOptions, folderOptions, folderPathLabel,
                    historyModal, openHistory, deleteHistoryVersion,
                    displayFiles: computed(() => {
                        let list = allFiles.value;
                        if(searchQuery.value) list = list.filter(f => f.name.toLowerCase().includes(searchQuery.value.toLowerCase()));
                        else list = list.filter(f => f.folder_id === currentFolderId.value);
                        if(onlyMyFiles.value) list = list.filter(f => f.submitter === currentUser.value);
                        const groups = {};
                        list.forEach(f => {
                            const key = `${f.folder_id || 0}::${f.name}`;
                            if(!groups[key]) groups[key] = [];
                            groups[key].push(f);
                        });
                        return Object.values(groups).map(g => {
                            const sorted = sortVersions(g);
                            const main = sorted[0];
                            main.history = sorted;
                            return main;
                        });
                    }),
                    displayFolders: computed(() => { let list = allFolders.value; if(searchQuery.value) list = list.filter(f => f.name.toLowerCase().includes(searchQuery.value.toLowerCase())); else list = list.filter(f => f.parent_id === currentFolderId.value); return list; }),
                    breadcrumbs: computed(() => { const path = []; let curr = allFolders.value.find(f => f.id === currentFolderId.value); while(curr) { path.unshift(curr); curr = allFolders.value.find(f => f.id === curr.parent_id); } return path; }),
                    getFileIcon: (n) => {
                        const name = n.toLowerCase();
                        if(name.endsWith('.pdf')) return 'ri-file-pdf-line';
                        if(name.endsWith('.zip') || name.endsWith('.rar') || name.endsWith('.7z')) return 'ri-file-zip-line';
                        if(name.endsWith('.bin') || name.endsWith('.img') || name.endsWith('.hex')) return 'ri-cpu-line';
                        return 'ri-file-3-line';
                    }
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
