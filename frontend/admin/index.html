<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>RD Panel - 管理后台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 transition-colors duration-300">
    <div id="app" class="flex min-h-screen">
        <div v-if="!token" class="fixed inset-0 bg-slate-900/60 flex items-center justify-center z-50 backdrop-blur-sm">
            <div class="bg-white dark:bg-slate-800 p-10 rounded-[40px] shadow-2xl w-full max-w-sm border border-slate-100 dark:border-slate-700">
                <div class="text-center mb-8">
                    <div class="w-16 h-16 bg-blue-600 rounded-2xl mx-auto flex items-center justify-center text-white text-2xl shadow-lg shadow-blue-500/30"><i class="ri-command-line"></i></div>
                    <h2 class="text-2xl font-black mt-4 text-slate-800 dark:text-white">系统登录</h2>
                </div>
                <div class="space-y-4">
                    <input v-model="loginForm.username" placeholder="管理员账号" class="w-full p-4 bg-slate-50 dark:bg-slate-900 border-0 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition">
                    <input v-model="loginForm.password" type="password" placeholder="密码" class="w-full p-4 bg-slate-50 dark:bg-slate-900 border-0 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition" @keyup.enter="doLogin">
                    <button @click="doLogin" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold hover:bg-blue-700 hover:shadow-lg transition transform active:scale-95">立即进入</button>
                </div>
            </div>
        </div>

        <template v-else>
            <aside class="w-72 bg-white dark:bg-slate-800 border-r border-slate-200 dark:border-slate-700 flex flex-col h-screen sticky top-0 z-30">
                <div class="p-8 flex items-center gap-3 border-b border-slate-50 dark:border-slate-700">
                    <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-500/20"><i class="ri-cpu-line text-xl"></i></div>
                    <span class="font-black text-xl tracking-tighter">RD Panel</span>
                </div>
                <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
                    <button @click="tab='files'" :class="tab==='files'?'bg-blue-600 text-white shadow-xl shadow-blue-500/20':'text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-700'" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition font-bold"><i class="ri-folder-6-line"></i> 资源管理</button>
                    <button @click="tab='upload'" :class="tab==='upload'?'bg-blue-600 text-white shadow-xl shadow-blue-500/20':'text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-700'" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition font-bold"><i class="ri-upload-cloud-2-line"></i> 发布固件</button>
                    <button v-if="role==='admin'" @click="tab='users'" :class="tab==='users'?'bg-blue-600 text-white shadow-xl shadow-blue-500/20':'text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-700'" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition font-bold"><i class="ri-team-line"></i> 成员授权</button>
                    <button @click="tab='pass'" :class="tab==='pass'?'bg-blue-600 text-white shadow-xl shadow-blue-500/20':'text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-700'" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition font-bold"><i class="ri-shield-keyhole-line"></i> 修改密码</button>
                    <div v-if="role==='admin'" class="mt-4 pt-4 border-t border-slate-100 dark:border-slate-700">
                         <button @click="tab='cfg'" :class="tab==='cfg'?'bg-slate-800 text-white':'text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-700'" class="w-full flex items-center gap-4 px-5 py-3 rounded-2xl transition font-bold text-sm"><i class="ri-settings-3-line"></i> 前端显示配置</button>
                    </div>
                </nav>
                <div class="p-6 border-t border-slate-50 dark:border-slate-700"><button @click="logout" class="w-full py-4 text-red-500 bg-red-50 dark:bg-red-900/20 rounded-2xl font-bold hover:bg-red-100 transition">退出登录</button></div>
            </aside>

            <main class="flex-1 flex flex-col min-w-0 h-screen overflow-y-auto">
                <header class="h-20 bg-white/80 dark:bg-slate-800/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-700 px-10 flex items-center justify-between sticky top-0 z-20">
                    <div class="flex items-center gap-2 text-sm"><span class="text-slate-400 font-bold uppercase tracking-widest">Workspace</span><i class="ri-arrow-right-s-line text-slate-300"></i><span class="font-black text-slate-700 dark:text-slate-200 capitalize">{{tab}}</span></div>
                    <div class="flex items-center gap-5">
                        <button @click="toggleDark" class="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-100 dark:bg-slate-700 text-slate-500 hover:bg-slate-200 transition"><i :class="isDark?'ri-sun-line text-yellow-500':'ri-moon-line'"></i></button>
                        <a href="/" target="_blank" class="flex items-center gap-2 text-sm font-bold text-blue-600 bg-blue-50 dark:bg-blue-900/30 px-5 py-2.5 rounded-xl hover:bg-blue-100 transition"><i class="ri-external-link-line"></i> 预览公共端</a>
                        <div class="flex items-center gap-3 border-l dark:border-slate-700 pl-6"><span class="font-black text-slate-700 dark:text-slate-200">{{currentUser}}</span></div>
                    </div>
                </header>

                <div class="p-10 pb-20">
                    <div v-if="tab==='files'" class="bg-white dark:bg-slate-800 rounded-[32px] border border-slate-200 dark:border-slate-700 shadow-sm overflow-hidden">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 dark:bg-slate-900/50 text-[10px] font-black text-slate-400 uppercase tracking-widest"><tr><th class="px-8 py-5">类型</th><th class="px-8 py-5">文件信息</th><th class="px-8 py-5">发布人</th><th class="px-8 py-5 text-right">操作</th></tr></thead>
                            <tbody class="divide-y divide-slate-100 dark:divide-slate-700">
                                <tr v-for="f in files" class="hover:bg-slate-50/50 dark:hover:bg-slate-700/50 transition">
                                    <td class="px-8 py-6"><div :class="getIconBg(f.name)" class="w-12 h-12 rounded-2xl flex items-center justify-center text-xl shadow-sm"><i :class="getFileIcon(f.name)"></i></div></td>
                                    <td class="px-8 py-6"><div class="font-black text-slate-800 dark:text-slate-100 text-base">{{f.name}}</div><div class="text-xs text-slate-400 mt-1 font-mono">{{f.date}}</div></td>
                                    <td class="px-8 py-6"><span class="px-3 py-1 bg-slate-100 dark:bg-slate-700 rounded-lg text-[10px] font-bold text-slate-500 uppercase tracking-wider">{{f.submitter}}</span></td>
                                    <td class="px-8 py-6 text-right"><button @click="delF(f.id)" class="w-10 h-10 rounded-xl flex items-center justify-center text-slate-300 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 transition"><i class="ri-delete-bin-7-line text-lg"></i></button></td>
                                </tr>
                            </tbody>
                        </table>
                        <div v-if="files.length===0" class="p-20 text-center text-slate-300 font-bold">暂无文件，请前往“发布固件”上传</div>
                    </div>

                    <div v-if="tab==='upload'" class="max-w-2xl mx-auto space-y-8">
                        <div @dragover.prevent="drag=true" @dragleave.prevent="drag=false" @drop.prevent="onDrop" @click="$refs.fIn.click()" :class="drag?'border-blue-500 bg-blue-50 dark:bg-blue-900/20 scale-[1.02]':'border-slate-200 dark:border-slate-700'" class="border-2 border-dashed p-16 rounded-[48px] text-center cursor-pointer transition-all duration-300 bg-white dark:bg-slate-800 shadow-sm hover:shadow-md">
                            <input type="file" ref="fIn" class="hidden" @change="onFile">
                            <div v-if="!file" class="animate-pulse"><i class="ri-upload-cloud-2-line text-7xl text-slate-200 mb-6 block"></i></div>
                            <div v-else class="text-blue-600 font-black text-2xl mb-2 flex items-center justify-center gap-2"><i class="ri-file-zip-line"></i> {{file.name}}</div>
                            <p class="text-slate-400 font-bold">{{file?'文件已就绪，请填写下方版本信息':'点击或拖拽文件到此处'}}</p>
                        </div>
                        <div class="bg-white dark:bg-slate-800 p-8 rounded-[40px] border border-slate-200 dark:border-slate-700 space-y-5 shadow-sm">
                            <div class="grid grid-cols-1 gap-5">
                                <input v-model="form.v" placeholder="版本号 (例如 v2.0.4)" class="w-full p-5 bg-slate-50 dark:bg-slate-900 rounded-2xl outline-none font-bold text-slate-700 dark:text-slate-200 focus:ring-2 focus:ring-blue-500 transition">
                                <textarea v-model="form.c" placeholder="本次变更记录..." class="w-full p-5 bg-slate-50 dark:bg-slate-900 rounded-2xl h-40 outline-none font-medium text-slate-700 dark:text-slate-200 focus:ring-2 focus:ring-blue-500 transition resize-none"></textarea>
                            </div>
                            <button @click="doUp" :disabled="uping" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-lg shadow-xl shadow-blue-600/20 hover:bg-blue-700 hover:shadow-blue-600/40 transition transform active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed">
                                {{uping?'正在上传...':'确认发布'}}
                            </button>
                        </div>
                    </div>

                    <div v-if="tab==='users' && role==='admin'" class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                        <div class="bg-white dark:bg-slate-800 p-10 rounded-[40px] border border-slate-200 dark:border-slate-700 shadow-sm h-fit">
                            <h3 class="font-black text-2xl mb-8 flex items-center gap-3"><i class="ri-user-add-line text-blue-500"></i> 新增成员</h3>
                            <div class="space-y-4">
                                <input v-model="uForm.username" placeholder="登录账号" class="w-full p-5 bg-slate-50 dark:bg-slate-900 rounded-2xl outline-none font-bold focus:ring-2 focus:ring-blue-500 transition">
                                <input v-model="uForm.password" type="text" placeholder="初始密码" class="w-full p-5 bg-slate-50 dark:bg-slate-900 rounded-2xl outline-none font-bold focus:ring-2 focus:ring-blue-500 transition">
                                <button @click="addU" class="w-full bg-slate-900 dark:bg-white dark:text-slate-900 text-white py-5 rounded-2xl font-black hover:opacity-90 transition">创建账号</button>
                            </div>
                        </div>
                        <div class="bg-white dark:bg-slate-800 p-10 rounded-[40px] border border-slate-200 dark:border-slate-700 shadow-sm">
                            <h3 class="font-black text-2xl mb-8 text-slate-400">成员列表</h3>
                            <div class="space-y-3 max-h-[500px] overflow-y-auto pr-2 custom-scrollbar">
                                <template v-for="u in userList">
                                    <div v-if="u.username" class="flex items-center justify-between p-5 bg-slate-50 dark:bg-slate-900 rounded-3xl group hover:bg-white dark:hover:bg-slate-800 hover:shadow-md transition border border-transparent hover:border-slate-100 dark:hover:border-slate-700">
                                        <div class="flex items-center gap-4">
                                            <div class="w-10 h-10 rounded-full bg-blue-100 dark:bg-blue-900 flex items-center justify-center text-blue-600 font-black">{{u.username[0]}}</div>
                                            <div>
                                                <div class="font-bold text-slate-800 dark:text-white">{{u.username}}</div>
                                                <div class="text-xs text-slate-400 font-bold uppercase">{{u.role}}</div>
                                            </div>
                                        </div>
                                        <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition">
                                            <button @click="resetU(u)" title="重置密码" class="w-10 h-10 bg-orange-50 dark:bg-orange-900/20 text-orange-500 rounded-xl hover:bg-orange-500 hover:text-white transition flex items-center justify-center"><i class="ri-key-2-line"></i></button>
                                            <button v-if="u.username!=='admin'" @click="delU(u.id)" title="删除" class="w-10 h-10 bg-red-50 dark:bg-red-900/20 text-red-500 rounded-xl hover:bg-red-500 hover:text-white transition flex items-center justify-center"><i class="ri-delete-bin-line"></i></button>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>
                    
                    <div v-if="tab==='pass'" class="max-w-md mx-auto bg-white dark:bg-slate-800 p-12 rounded-[48px] border border-slate-200 dark:border-slate-700 shadow-sm text-center">
                        <div class="w-20 h-20 bg-green-100 dark:bg-green-900/30 text-green-500 rounded-3xl flex items-center justify-center text-4xl mx-auto mb-6"><i class="ri-shield-check-line"></i></div>
                        <h3 class="font-black text-2xl mb-2">更新密码</h3>
                        <p class="text-slate-400 text-sm mb-8 font-bold">为当前账号 {{currentUser}} 设置新密码</p>
                        <input v-model="newP" type="password" placeholder="输入新密码" class="w-full p-5 bg-slate-50 dark:bg-slate-900 rounded-2xl outline-none mb-6 font-bold text-center focus:ring-2 focus:ring-green-500 transition">
                        <button @click="setPw" class="w-full bg-green-500 text-white py-5 rounded-2xl font-black hover:bg-green-600 transition shadow-xl shadow-green-500/20">确认修改</button>
                    </div>

                    <div v-if="tab==='cfg'" class="max-w-lg mx-auto bg-white dark:bg-slate-800 p-10 rounded-[40px] border border-slate-200 dark:border-slate-700 shadow-sm space-y-4">
                        <h3 class="font-black text-2xl mb-6">前端显示配置</h3>
                        <label v-for="(v,k) in {'show_md5':'MD5 校验码','show_version':'固件版本号','show_date':'发布日期','show_changelog':'变更日志','show_submitter':'发布者信息'}" class="flex items-center justify-between p-5 bg-slate-50 dark:bg-slate-900 rounded-2xl cursor-pointer hover:bg-slate-100 dark:hover:bg-slate-800 transition">
                            <span class="font-bold text-slate-600 dark:text-slate-300">{{v}}</span>
                            <div class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" v-model="config[k]" @change="saveCfg" class="sr-only peer">
                                <div class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
                            </div>
                        </label>
                    </div>
                </div>
            </main>
        </template>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;
        createApp({
            setup() {
                const isDark = ref(localStorage.getItem('theme') === 'dark');
                const token = ref(localStorage.getItem('token') || '');
                const role = ref(localStorage.getItem('role') || '');
                const currentUser = ref(localStorage.getItem('user') || '');
                const tab = ref('files');
                const drag = ref(false);
                const uping = ref(false);
                const file = ref(null);
                const files = ref([]);
                const userList = ref([]);
                const config = ref({});
                const loginForm = ref({username:'', password:''});
                const form = ref({v:'', c:''});
                const uForm = ref({username:'', password:''});
                const newP = ref('');

                const toggleDark = () => { isDark.value = !isDark.value; document.documentElement.classList.toggle('dark'); localStorage.setItem('theme', isDark.value?'dark':'light'); };
                
                const getFileIcon = (n) => {
                    if(!n) return 'ri-file-unknow-line';
                    if(n === 'Image' || n === 'zImage') return 'ri-pulse-line';
                    const ext = n.split('.').pop().toLowerCase();
                    if(['bin','hex'].includes(ext)) return 'ri-cpu-line';
                    if(ext==='img') return 'ri-disc-line';
                    if(['zip','rar','7z','tar','gz'].includes(ext)) return 'ri-file-zip-line';
                    return 'ri-file-3-line';
                };
                const getIconBg = (n) => {
                    if(!n) return 'bg-slate-100 text-slate-500';
                    if(n === 'Image' || n === 'zImage') return 'bg-purple-100 text-purple-600 dark:bg-purple-900/30 dark:text-purple-400';
                    const ext = n.split('.').pop().toLowerCase();
                    if(['bin','img','hex'].includes(ext)) return 'bg-orange-100 text-orange-600 dark:bg-orange-900/30 dark:text-orange-400';
                    return 'bg-blue-100 text-blue-600 dark:bg-blue-900/30 dark:text-blue-400';
                };

                const api = async (u, o={}) => {
                    try {
                        // 增加时间戳防止缓存
                        const url = u.includes('?') ? `${u}&t=${Date.now()}` : `${u}?t=${Date.now()}`;
                        const res = await fetch(url, {...o, headers: {...o.headers, 'Authorization': `Bearer ${token.value}`}});
                        if(res.status === 401) logout();
                        return res;
                    } catch(e) { alert('网络错误'); return {ok:false}; }
                };

                const doLogin = async () => {
                    const fd = new FormData(); fd.append('username', loginForm.value.username); fd.append('password', loginForm.value.password);
                    const res = await fetch('/token', {method:'POST', body:fd});
                    if(res.ok) {
                        const d = await res.json(); token.value = d.access_token; role.value = d.role; currentUser.value = loginForm.value.username;
                        localStorage.setItem('token', d.access_token); localStorage.setItem('role', d.role); localStorage.setItem('user', currentUser.value);
                        location.reload();
                    } else alert('登录失败');
                };

                const loadData = async () => {
                    if(!token.value) return;
                    files.value = await api('/api/public/files').then(r=>r.json());
                    if(role.value === 'admin') userList.value = await api('/api/admin/users').then(r=>r.json());
                    config.value = await api('/api/public/config').then(r=>r.json());
                };

                const onDrop = (e) => { drag.value = false; file.value = e.dataTransfer.files[0]; };
                const onFile = (e) => { file.value = e.target.files[0]; };
                
                const doUp = async () => {
                    if(!file.value) return; uping.value = true;
                    const fd = new FormData(); fd.append('file', file.value); fd.append('version', form.value.v); fd.append('changelog', form.value.c);
                    if((await api('/api/upload', {method:'POST', body:fd})).ok) { file.value = null; form.value = {v:'', c:''}; tab.value='files'; loadData(); }
                    uping.value = false;
                };

                const delF = async (id) => { if(confirm('删除文件?')) { await api(`/api/admin/files/${id}`, {method:'DELETE'}); loadData(); } };
                const addU = async () => { 
                    if(!uForm.value.username || !uForm.value.password) return alert('请填写完整');
                    const res = await api('/api/admin/users', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(uForm.value)});
                    if(res.ok) { alert('创建成功'); uForm.value={username:'', password:''}; loadData(); }
                    else { const d = await res.json(); alert(d.detail); }
                };
                const delU = async (id) => { if(confirm('注销该账号?')) { await api(`/api/admin/users/${id}`, {method:'DELETE'}); loadData(); } };
                const resetU = async (u) => { 
                    const p = prompt(`重置 ${u.username} 的密码:`, "123456");
                    if(p) await api(`/api/admin/users/${u.id}/reset`, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({new_password:p})});
                };
                const saveCfg = () => api('/api/admin/settings', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(config.value)});
                const setPw = async () => { if(await api('/api/user/password', {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({new_password:newP.value})})) { alert('密码更新成功，请重新登录'); logout(); } };
                const logout = () => { localStorage.clear(); location.reload(); };

                onMounted(() => { if(isDark.value) document.documentElement.classList.add('dark'); loadData(); });
                return { isDark, toggleDark, token, role, currentUser, tab, drag, uping, file, files, userList, loginForm, form, uForm, newP, getFileIcon, getIconBg, doLogin, onDrop, onFile, doUp, delF, addU, delU, resetU, setPw, saveCfg, logout };
            }
        }).mount('#app');
    </script>
</body>
</html>
